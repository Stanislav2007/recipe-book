services:
  mysql:
    image: mysql:8.4
    container_name: recipe_book_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: recipe_book
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - recipe_book_mysql_data:/var/lib/mysql

volumes:
  recipe_book_mysql_data:
