<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>My Recipes</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container">
    <div class="section-title"><div><h1>My Recipes</h1><p>Рецептите, които си създал.</p></div><a class="btn" href="/recipes/create">+ Add recipe</a></div>
    <div class="empty" th:if="${#lists.isEmpty(recipes)}">Все още нямаш добавени рецепти.</div>
    <div class="grid">
        <article class="card" th:each="recipe : ${recipes}">
            <img class="recipe-img" th:src="${recipe.imageUrl != null and !#strings.isEmpty(recipe.imageUrl) ? recipe.imageUrl : '/images/lasagna-plate.jpg'}" th:alt="${recipe.title}">
            <div class="card-body"><span class="tag" th:text="${recipe.category.name}"></span><h3 th:text="${recipe.title}"></h3><div class="actions"><a class="btn secondary" th:href="@{/recipes/{id}(id=${recipe.id})}">Details</a><a class="btn secondary" th:href="@{/recipes/{id}/edit(id=${recipe.id})}">Edit</a></div></div>
        </article>
    </div>
</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
