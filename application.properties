:root{
    --bg:#fff7ed;--paper:#fffdf8;--text:#2b2118;--muted:#7b6656;--primary:#c25a1d;--primary-dark:#823812;--accent:#f2b84b;--green:#527a3a;--danger:#b42318;--line:#ead9c7;--shadow:0 18px 45px rgba(87,47,20,.14);
}
*{box-sizing:border-box}body{font-family:Inter,Segoe UI,Arial,sans-serif;margin:0;background:radial-gradient(circle at top left,#ffe2b8 0,#fff7ed 34%,#fff 100%);color:var(--text);min-height:100vh}a{color:inherit}.site-nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 6%;background:rgba(255,253,248,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.brand{font-weight:900;text-decoration:none;font-size:24px;color:var(--primary-dark)}.nav-links{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.nav-links a,.ghost-btn{border:0;background:transparent;text-decoration:none;padding:9px 12px;border-radius:999px;color:var(--text);font-weight:700;cursor:pointer}.nav-links a:hover,.ghost-btn:hover{background:#fff0dd}.nav-cta,.btn{background:linear-gradient(135deg,var(--primary),var(--primary-dark))!important;color:white!important;box-shadow:0 10px 25px rgba(194,90,29,.25)}.user-pill{padding:8px 12px;border-radius:999px;background:#fff0dd;color:var(--primary-dark);font-weight:700}.nav-toggle{display:none}.container,main{width:min(1120px,92%);margin:32px auto}.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center;padding:42px;border-radius:34px;background:linear-gradient(135deg,rgba(255,253,248,.98),rgba(255,237,205,.82));box-shadow:var(--shadow);overflow:hidden}.eyebrow{text-transform:uppercase;letter-spacing:.16em;font-weight:900;color:var(--primary);font-size:13px}.hero h1{font-size:clamp(42px,7vw,76px);line-height:.96;margin:10px 0 18px}.hero p{font-size:19px;color:var(--muted);line-height:1.7}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.hero-collage{display:grid;grid-template-columns:1fr 1fr;gap:14px;transform:rotate(1deg)}.hero-collage img{width:100%;height:210px;object-fit:cover;border-radius:26px;box-shadow:0 18px 35px rgba(0,0,0,.16)}.hero-collage img:first-child{grid-row:span 2;height:436px}.section-title{display:flex;align-items:end;justify-content:space-between;gap:20px;margin:42px 0 18px}.section-title h2,h1{margin:0;font-size:34px}.section-title p{margin:8px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px}.card{background:var(--paper);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 12px 30px rgba(87,47,20,.08);transition:.18s transform,.18s box-shadow}.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}.card-body{padding:18px}.recipe-img{width:100%;height:210px;object-fit:cover;background:#f7e7d4}.recipe-img.large{height:440px;border-radius:28px;box-shadow:var(--shadow)}.tag{display:inline-flex;align-items:center;gap:6px;font-size:13px;background:#fff0dd;color:var(--primary-dark);padding:7px 10px;border-radius:999px;font-weight:800}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;color:var(--muted)}.btn,button{display:inline-block;border:0;padding:11px 16px;border-radius:999px;text-decoration:none;cursor:pointer;font-weight:800}.btn.secondary{background:#fff0dd!important;color:var(--primary-dark)!important;box-shadow:none}.danger{background:var(--danger)!important;color:white!important}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.panel{background:var(--paper);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:26px}.details-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:28px;align-items:start}.content-block{padding:20px;border-radius:22px;background:#fff7ed;border:1px solid var(--line);margin:14px 0;white-space:pre-line}.form-page{max-width:820px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field.full{grid-column:1/-1}label{display:block;font-weight:800;margin-bottom:6px}input,textarea,select{display:block;width:100%;padding:13px 14px;margin:0 0 10px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--text);font-size:15px}textarea{min-height:140px;resize:vertical}.hint{font-size:13px;color:var(--muted);margin-top:-4px}.error{color:var(--danger);font-size:14px;font-weight:700}.success{padding:12px 16px;background:#e9f8e4;color:#275b20;border-radius:16px;font-weight:800}.table-wrap{overflow:auto}table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:20px;overflow:hidden}td,th{border-bottom:1px solid var(--line);padding:13px;text-align:left}th{background:#fff0dd;color:var(--primary-dark)}form.inline{display:inline}.auth-card{max-width:520px;margin:48px auto}.site-footer{text-align:center;color:var(--muted);padding:36px}.empty{padding:34px;text-align:center;border:2px dashed var(--line);border-radius:24px;color:var(--muted)}
@media(max-width:780px){.hero,.details-grid{grid-template-columns:1fr}.hero-collage img,.hero-collage img:first-child{height:220px}.form-grid{grid-template-columns:1fr}.nav-links{font-size:14px}.site-nav{align-items:flex-start}.recipe-img.large{height:300px}}
