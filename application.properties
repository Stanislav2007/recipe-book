spring.application.name=Recipe Book
server.port=8080

# Relational database required by the assignment: MySQL is the default runtime database.
# Create the database automatically when the configured MySQL user has enough permissions.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/recipe_book?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional local/demo profile:
# mvn spring-boot:run -Dspring-boot.run.profiles=h2
